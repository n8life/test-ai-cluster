apiVersion: v1
kind: Secret
metadata:
  name: github-token
  namespace: langchain-test
type: Opaque
stringData:
  # Value is substituted from .env via envsubst.
  # Usage: set -a && source .env && set +a && envsubst < k8s/github-token-secret.yaml | kubectl apply -f -
  #
  # To create a new token:
  #   1. Go to https://github.com/settings/tokens?type=beta
  #   2. Token name: dependabot-fix-agent
  #   3. Repository access: select n8life/nftkv
  #   4. Permissions:
  #        Contents:         Read and Write (clone, push)
  #        Pull requests:    Read and Write (create PRs)
  #        Dependabot alerts: Read (fetch alerts)
  #   5. Generate -> copy token -> paste into .env as GITHUB_TOKEN
  GITHUB_TOKEN: "${GITHUB_TOKEN}"

apiVersion: v1
kind: Secret
metadata:
  name: langfuse-credentials
  namespace: langchain-test
type: Opaque
stringData:
  # Values are substituted from .env via envsubst.
  # Usage: set -a && source .env && set +a && envsubst < k8s/secret.yaml | kubectl apply -f -
  LANGFUSE_PUBLIC_KEY: "${LANGFUSE_PUBLIC_KEY}"
  LANGFUSE_SECRET_KEY: "${LANGFUSE_SECRET_KEY}"
